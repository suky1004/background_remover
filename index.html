<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 배경 제거 도구</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .drop-zone {
            border: 2px dashed #cbd5e1;
            transition: all 0.3s ease;
        }
        .drop-zone.drag-over {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center py-12 px-4">
    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl p-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">AI 배경 제거기</h1>
            <p class="text-slate-600">이미지를 업로드하면 AI가 배경을 투명하게 만들어 드립니다.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- 업로드 섹션 -->
            <div class="flex flex-col">
                <h2 class="text-lg font-semibold mb-3 text-slate-700">원본 이미지</h2>
                <div id="dropZone" class="drop-zone flex-1 rounded-xl flex flex-col items-center justify-center p-6 cursor-pointer bg-slate-50 hover:bg-slate-100">
                    <input type="file" id="fileInput" class="hidden" accept="image/*">
                    <div id="uploadPrompt" class="text-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto text-slate-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <p class="text-slate-500 font-medium">이미지를 클릭하거나 드래그하세요</p>
                    </div>
                    <img id="sourcePreview" class="hidden max-h-64 rounded-lg shadow-sm" alt="Source Preview">
                </div>
                <button id="processBtn" disabled class="mt-4 w-full py-3 bg-blue-600 text-white rounded-lg font-semibold disabled:bg-slate-300 disabled:cursor-not-allowed hover:bg-blue-700 transition">
                    배경 제거 시작
                </button>
            </div>

            <!-- 결과 섹션 -->
            <div class="flex flex-col">
                <h2 class="text-lg font-semibold mb-3 text-slate-700">결과 이미지</h2>
                <div id="resultContainer" class="flex-1 rounded-xl border-2 border-slate-100 bg-[url('https://www.transparenttextures.com/patterns/checkerboard.png')] flex items-center justify-center relative overflow-hidden min-h-[300px]">
                    <div id="loadingOverlay" class="hidden absolute inset-0 bg-white/80 flex flex-col items-center justify-center z-10">
                        <div class="loading-spinner mb-3"></div>
                        <p class="text-sm font-medium text-slate-600">배경을 분석 중입니다...</p>
                    </div>
                    
                    <div id="emptyResult" class="text-slate-400 text-center p-4">
                        <p>변환된 이미지가 여기에 표시됩니다</p>
                    </div>

                    <img id="resultImage" class="hidden max-h-64 z-0" alt="Result Image">
                </div>
                <button id="downloadBtn" disabled class="mt-4 w-full py-3 bg-emerald-600 text-white rounded-lg font-semibold disabled:bg-slate-300 disabled:cursor-not-allowed hover:bg-emerald-700 transition">
                    PNG 다운로드
                </button>
            </div>
        </div>

        <!-- 에러 메시지 -->
        <div id="errorMsg" class="hidden mt-6 p-4 bg-red-50 border border-red-200 text-red-600 rounded-lg text-center text-sm"></div>
    </div>

    <script>
        const apiKey = ""; // API Key는 환경에서 자동으로 주입됩니다.
        
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const sourcePreview = document.getElementById('sourcePreview');
        const uploadPrompt = document.getElementById('uploadPrompt');
        const processBtn = document.getElementById('processBtn');
        const resultImage = document.getElementById('resultImage');
        const emptyResult = document.getElementById('emptyResult');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const downloadBtn = document.getElementById('downloadBtn');
        const errorMsg = document.getElementById('errorMsg');

        let base64Source = null;

        // 드래그 앤 드롭 핸들러
        dropZone.onclick = () => fileInput.click();
        
        dropZone.ondragover = (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        };

        dropZone.ondragleave = () => {
            dropZone.classList.remove('drag-over');
        };

        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        };

        fileInput.onchange = (e) => {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        };

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showError('이미지 파일만 업로드 가능합니다.');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                sourcePreview.src = e.target.result;
                sourcePreview.classList.remove('hidden');
                uploadPrompt.classList.add('hidden');
                base64Source = e.target.result.split(',')[1];
                processBtn.disabled = false;
                hideError();
            };
            reader.readAsDataURL(file);
        }

        async function removeBackground() {
            if (!base64Source) return;

            setLoading(true);
            hideError();

            const prompt = "Remove the background of this image and make it transparent. Return ONLY the image with a transparent background in PNG format.";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`;

            const payload = {
                contents: [{
                    parts: [
                        { text: prompt },
                        { inlineData: { mimeType: "image/png", data: base64Source } }
                    ]
                }],
                generationConfig: {
                    responseModalities: ["IMAGE"]
                }
            };

            let retries = 0;
            const maxRetries = 5;

            async function makeRequest() {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        if (response.status === 429 && retries < maxRetries) {
                            const delay = Math.pow(2, retries) * 1000;
                            retries++;
                            await new Promise(resolve => setTimeout(resolve, delay));
                            return makeRequest();
                        }
                        throw new Error(`API 오류: ${response.status}`);
                    }

                    const data = await response.json();
                    const resultBase64 = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;

                    if (resultBase64) {
                        resultImage.src = `data:image/png;base64,${resultBase64}`;
                        resultImage.classList.remove('hidden');
                        emptyResult.classList.add('hidden');
                        downloadBtn.disabled = false;
                    } else {
                        throw new Error("이미지 생성에 실패했습니다.");
                    }
                } catch (err) {
                    showError("배경 제거 중 오류가 발생했습니다: " + err.message);
                } finally {
                    setLoading(false);
                }
            }

            await makeRequest();
        }

        function setLoading(isLoading) {
            loadingOverlay.classList.toggle('hidden', !isLoading);
            processBtn.disabled = isLoading;
            if (isLoading) {
                resultImage.classList.add('hidden');
                emptyResult.classList.remove('hidden');
                downloadBtn.disabled = true;
            }
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
        }

        function hideError() {
            errorMsg.classList.add('hidden');
        }

        processBtn.onclick = removeBackground;

        downloadBtn.onclick = () => {
            const link = document.createElement('a');
            link.href = resultImage.src;
            link.download = 'background-removed.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
    </script>
</body>
</html>
